<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Fireworks 🎆</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

/* HAPPY BIRTHDAY TEXT */
#birthdayText{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%) scale(0.6);

    color:white;

    font-size:90px;
    font-weight:bold;

    letter-spacing:5px;

    opacity:0;

    filter:blur(40px);

    transition:
    all 2.5s ease;

    text-shadow:
    0 0 10px white,
    0 0 25px #ff4d6d,
    0 0 45px #ff1744;
}

#birthdayText{

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    font-size:40px;   /* clean + single line */
    font-weight:900;

    color:white;

    white-space:nowrap;  /* SINGLE LINE FIX */

    opacity:0;

    letter-spacing:3px;

    filter:blur(25px);

    transition:all 1.8s ease;

    text-shadow:
    0 0 8px #ffffff,
    0 0 18px #ff4d6d,
    0 0 35px #ff1744,
    0 0 60px #ff9100;
}

/* SHOW ANIMATION */
#birthdayText.show{

    opacity:1;

    filter:blur(0px);

    transform:translate(-50%,-50%) scale(1);

    animation:pop 1.5s ease forwards;
}

@keyframes pop{
    0%{
        transform:translate(-50%,-50%) scale(0.6);
        filter:blur(30px);
        opacity:0;
    }
    60%{
        transform:translate(-50%,-50%) scale(1.1);
        opacity:1;
    }
    100%{
        transform:translate(-50%,-50%) scale(1);
        filter:blur(0px);
    }
}
</style>
</head>

<body>

<h1 id="birthdayText">
HAPPY BIRTHDAY BHAiiiiiiiiiiii ❤️🎂
</h1>

<canvas id="canvas"></canvas>
<audio id="bgSound" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5f7c4b2.mp3?filename=fireworks-ambient-110859.mp3" type="audio/mpeg">
</audio>" preload="auto"></audio>

<script>
const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

window.addEventListener(
"resize",
()=>{

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

});

const text =
document.getElementById(
"birthdayText"
);

let rockets = [];
let particles = [];

let showSmall =
false;

let stopBig =
false;

// ROCKET 🚀
class Rocket{

    constructor(x){

        this.x = x;

        this.y =
        canvas.height;

        this.targetY =
        Math.random() *
        canvas.height/2 + 100;

        this.speed =
        Math.random()*3 + 7;

        this.color =
        `hsl(
        ${Math.random()*360},
        100%,
        60%
        )`;
    }

    update(){

        this.y -= this.speed;

        particles.push(

            new Particle(

                this.x,

                this.y,

                this.color,

                Math.random()*2-1,

                Math.random()*2,

                true
            )
        );

        if(this.y <= this.targetY){

            this.explode();

            return true;
        }

        return false;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            3,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
        "white";

        ctx.shadowBlur = 20;

        ctx.shadowColor =
        this.color;

        ctx.fill();
    }

    explode(){

        for(let i=0;i<250;i++){

            const angle =
            Math.random() *
            Math.PI*2;

            const speed =
            Math.random()*8+2;

            particles.push(

                new Particle(

                    this.x,

                    this.y,

                    this.color,

                    Math.cos(angle)
                    *speed,

                    Math.sin(angle)
                    *speed,

                    false
                )
            );
        }
    }
}

// PARTICLES ✨
class Particle{

    constructor(
        x,y,color,vx,vy,trail
    ){

        this.x = x;
        this.y = y;

        this.color = color;

        this.vx = vx;
        this.vy = vy;

        this.alpha = 1;

        this.trail = trail;

        this.size =
        trail
        ? 2
        : Math.random()*3+2;
    }

    update(){

        this.x += this.vx;

        this.y += this.vy;

        if(!this.trail){

            this.vy += 0.05;
        }

        this.alpha -=
        this.trail
        ? 0.03
        : 0.01;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha =
        this.alpha;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
        this.color;

        ctx.shadowBlur = 20;

        ctx.shadowColor =
        this.color;

        ctx.fill();

        ctx.restore();
    }
}

// ANIMATION
function animate(){

    requestAnimationFrame(
        animate
    );

    ctx.fillStyle =
    "rgba(0,0,0,0.15)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    rockets.forEach(
    (rocket,index)=>{

        rocket.draw();

        if(
            rocket.update()
        ){

            rockets.splice(
                index,
                1
            );
        }
    });

    particles.forEach(
    (particle,index)=>{

        particle.update();

        particle.draw();

        if(
            particle.alpha <= 0
        ){

            particles.splice(
                index,
                1
            );
        }
    });
const sound = document.getElementById("bgSound");

let started = false;

function startSound(){
    if(!started){
        sound.volume = 0.7;
        sound.play();
        started = true;
    }
}

// click anywhere
window.addEventListener("click", startSound);

// touch mobile
window.addEventListener("touchstart", startSound);
    // SMALL FIREWORKS 🎆
    if(showSmall){

        if(Math.random() < 0.08){

            createSmallFirework();
        }
    }
}

animate();

function launchRocket(x){

    if(!stopBig){

        rockets.push(
            new Rocket(x)
        );
    }
}

// BIG FIREWORKS
const bigFireworks =
setInterval(()=>{

    launchRocket(
        Math.random()
        *canvas.width
    );

},700);

// STOP BIG + SHOW TEXT
setTimeout(()=>{

    stopBig = true;

    clearInterval(
        bigFireworks
    );

    text.classList.add(
        "show"
    );

    showSmall = true;

},7000);

// SMALL FIREWORKS 🎆
function createSmallFirework(){

    const x =
    Math.random() *
    canvas.width;

    const y =
    Math.random() *
    canvas.height/2;

    const color =
    `hsl(
    ${Math.random()*360},
    100%,
    60%
    )`;

    for(let i=0;i<40;i++){

        const angle =
        Math.random() *
        Math.PI*2;

        const speed =
        Math.random()*3+1;

        particles.push(

            new Particle(

                x,
                y,

                color,

                Math.cos(angle)
                *speed,

                Math.sin(angle)
                *speed,

                false
            )
        );
    }
}

// CLICK FIREWORKS
canvas.addEventListener(
"click",
(e)=>{

    if(!stopBig){

        launchRocket(
            e.clientX
        );
    }
});
</script>

</body>
</html>
